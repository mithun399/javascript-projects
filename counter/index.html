<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter App | Mithun JS Projects</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <h1>
        Counter App
    </h1>


    <p class="subtitle">
        Simple JavaScript counter application
    </p>



    <div class="counter-card">


        <div id="countLabel">
            0
        </div>



        <div id="btnContainer">

            <button id="decreaseBtn" class="button">
                − Decrease
            </button>


            <button id="resetBtn" class="button reset">
                Reset
            </button>


            <button id="increaseBtn" class="button">
                + Increase
            </button>

        </div>


    </div>



    <a class="back-btn" href="../index.html">
        ← Back to Projects
    </a>

</div>
